<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // Check if user has active test session
        const hasActiveSession = sessionStorage.getItem('quizState');
        
        if (hasActiveSession) {
            // User has active test - stay on old version to finish
            window.location.href = 'index-old.html';
        } else {
            // No active test - send to new version
            window.location.href = 'index-v2.html';
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
