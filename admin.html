<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quiz Results</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .login-form, .results-section {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }
        .hidden {
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        .error {
            color: #c62828;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 Admin Panel - Quiz Results</h1>
        
        <!-- Login Section -->
        <div id="loginSection" class="login-form">
            <h3>Enter Admin Password</h3>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Admin password">
            </div>
            <button class="btn" onclick="login()">Login</button>
            <div id="loginError" class="error hidden">Invalid password</div>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="results-section hidden">
            <h3>Quiz Results</h3>
            <button class="btn" onclick="loadResults()" style="margin-bottom: 20px;">Refresh Results</button>
            <div id="resultsTable"></div>
            <button class="btn" onclick="logout()" style="margin-top: 20px; background: #757575;">Logout</button>
        </div>
    </div>

    <script>
        // Set your admin password here
        const ADMIN_PASSWORD = 'admin123'; // CHANGE THIS!
        
        // Your Google Sheet ID
        const SHEET_ID = '1V9qKp_odT3pKu_MA_a4zNg3xwhw-nffjtg7HB9UKxyc';
        
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('resultsSection').classList.remove('hidden');
                loadResults();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }

        async function loadResults() {
            try {
                // Use Google Sheets API or Apps Script to fetch data
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                let html = '<table><thead><tr>';
                json.table.cols.forEach(col => {
                    html += `<th>${col.label}</th>`;
                });
                html += '</tr></thead><tbody>';
                
                json.table.rows.forEach(row => {
                    html += '<tr>';
                    row.c.forEach(cell => {
                        html += `<td>${cell ? cell.v : ''}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table>';
                
                document.getElementById('resultsTable').innerHTML = html;
            } catch (error) {
                document.getElementById('resultsTable').innerHTML = 'Error loading results: ' + error.message;
            }
        }

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            loadResults();
        }
    </script>
</body>
</html>
